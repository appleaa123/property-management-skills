# Form Registry
#
# Maps jurisdiction codes to their blank form assets and semantic field mappings.
# Used by fill_ltb_form.py (--jurisdiction flag) and the ltb-forms SKILL.md
# onboarding workflow.
#
# To add a new jurisdiction: follow the onboarding workflow in SKILL.md.
# The agent will inspect the blank PDF, map fields via HITL, and append here.
#
# Field map keys are semantic roles; values are the exact PDF field names.
# A null value means the field does not exist in that form.

jurisdictions:
  CA-ON:
    name: "Ontario, Canada — Landlord and Tenant Board"
    authority: "Landlord and Tenant Board (LTB)"
    governing_law: "Residential Tenancies Act (Ontario)"
    forms:
      N1:
        file: "CA-ON/N1-blank.pdf"
        purpose: "Notice of Rent Increase"
        trigger: "generate N1 for [tenant]"
        field_map:
          recipient_name: "To_TenantName[0]"
          sender_name: "From_LandlordName[0]"
          address: "RentUnitAddress[0]"
          signer_full_name: "SignName[0]"
          signer_phone: "SignPhoneNum[0]"
          sign_date: "SignDate[0]"
          effective_date: "StartDate[0]"
          increase_amount: "RentIncAmount1[0]"
          increase_pct: "RentIncPercent[0]"
          payment_period_monthly: "PaymentPeriodM[0]"
          # Checkboxes (XFA layer)
          check1: "Check1[0]"
          check2: "Check2[0]"
          check_2_1: "Check_2_1[0]"
          check_2_2: "Check_2_2[0]"
          select_sign: "SelectSign[0]"
        date_format:
          effective_date: "DD MM YYYY" # form pre-prints / separators
          sign_date: "DD/MM/YYYY"
        phone_format: " NXX NXX XXXX" # leading space; form pre-prints ( ) -
        notes: "N1 uses To_TenantName (not TO_TenameName) and RentUnitAddress (not RentalUnitAddress)."

      N4:
        file: "CA-ON/N4-blank.pdf"
        purpose: "Notice to End Tenancy — Non-Payment of Rent"
        trigger: "generate N4 for [tenant]"
        field_map:
          recipient_name: "TO_TenameName[0]"
          sender_name: "From_LandlordName[0]"
          address: "RentalUnitAddress[0]"
          signer_first_name: "RFirstName[0]"
          signer_last_name: "RLastName[0]"
          signer_phone: "RDayPhone[0]"
          sign_date: "SignDate[0]"
          pay_by_date: "PayDate[0]"
          arrear_from: "ArrearFrom1[0]"
          arrear_to: "ArrearTo1[0]"
          rent_charged: "RentCharge1[0]"
          rent_paid: "RentPaid1[0]"
          rent_owed: "RentOwe1[0]"
          total_owed: "TotalRentOwe[0]"
          total_owed_header: "OweMeAmount[0]"
          # Checkboxes (XFA layer)
          checklist_1: "CheckList1[0]"
          checklist_2: "CheckList2[0]"
          checklist_3: "CheckList3[0]"
          checklist_4: "CheckList4[0]"
          checklist_5: "CheckList5[0]"
          checklist_6: "CheckList6[0]"
          checklist_7: "CheckList7[0]"
          select_sign: "SelectSign[0]"
        date_format:
          pay_by_date: "DD MM YYYY"
          arrear_from: "DD MM YYYY"
          arrear_to: "DD MM YYYY"
          sign_date: "DD/MM/YYYY"
        phone_format: " NXX NXX XXXX"

      N9:
        file: "CA-ON/N9-blank.pdf"
        purpose: "Tenant's Notice to Terminate Tenancy"
        trigger: "generate N9 for [tenant]"
        field_map:
          recipient_name: "TO_TenameName[0]" # landlord receives
          sender_name: "From_LandlordName[0]" # tenant sends (field name is misleading)
          address: "RentalUnitAddress[0]"
          signer_first_name: "RFirstName[0]"
          signer_last_name: "RLastName[0]"
          signer_phone: "RDayPhone[0]"
          sign_date: "SignDate[0]"
          termination_date: "TerminationDate[0]"
          # Checkboxes (XFA layer)
          checklist_1: "CheckList1[0]"
          checklist_2: "CheckList2[0]"
          checklist_3: "CheckList3[0]"
          checklist_4: "CheckList4[0]"
          checklist_5: "CheckList5[0]"
          checklist_6: "CheckList6[0]"
          checklist_7: "CheckList7[0]"
          select_sign: "SelectSign[0]"
        date_format:
          termination_date: "DD MM YYYY"
          sign_date: "DD/MM/YYYY"
        phone_format: " NXX NXX XXXX"
        notes: "N9 reverses sender/recipient — tenant sends to landlord. From_LandlordName holds tenant name; TO_TenameName holds landlord name."

      N12:
        file: "CA-ON/N12-blank.pdf"
        purpose: "Notice to End Tenancy — Landlord's Own Use"
        trigger: "generate N12 for [tenant]"
        field_map:
          recipient_name: "TO_TenameName[0]"
          sender_name: "From_LandlordName[0]"
          address: "RentalUnitAddress[0]"
          signer_first_name: "RFirstName[0]"
          signer_last_name: "RLastName[0]"
          signer_phone: "RDayPhone[0]"
          sign_date: "SignDate[0]"
          termination_date: "TerminationDate[0]"
          # Checkboxes (XFA layer)
          checklist_1: "CheckList1[0]"
          checklist_2: "CheckList2[0]"
          checklist_3: "CheckList3[0]"
          checklist_4: "CheckList4[0]"
          checklist_5: "CheckList5[0]"
          checklist_6: "CheckList6[0]"
          checklist_7: "CheckList7[0]"
          select_sign: "SelectSign[0]"
        date_format:
          termination_date: "DD MM YYYY"
          sign_date: "DD/MM/YYYY"
        phone_format: " NXX NXX XXXX"

  # Placeholder — populate via the ltb-forms onboarding workflow in SKILL.md
  US-CA:
    name: "California — Residential Rent Notices"
    authority: "California Department of Consumer Affairs"
    governing_law: "AB 1482 (Tenant Protection Act)"
    forms: {}

  CUSTOM:
    name: "Custom / Unknown Jurisdiction"
    authority: null
    governing_law: null
    forms: {}
